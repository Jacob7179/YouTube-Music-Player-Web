name: Deploy YouTube Music Player to Pages

on:
  push:
    branches: ["main"]

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Ensures JavaScript-based GitHub Actions run with Node.js 24.
# This avoids Node 20 deprecation warnings and compatibility issues.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Build Pages artifact and inject API key
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          set -euo pipefail

          SITE_DIR="$RUNNER_TEMP/youtube-music-player"
          rm -rf "$SITE_DIR"
          mkdir -p "$SITE_DIR"

          # Copy only deployable project files.
          # The original script.js in the repository stays unchanged.
          rsync -a \
            --exclude=".git/" \
            --exclude=".github/" \
            --exclude="node_modules/" \
            --exclude="dist/" \
            ./ "$SITE_DIR/"

          python3 - "$SITE_DIR/script.js" <<'PY'
          from pathlib import Path
          import os
          import sys

          api_key = os.environ.get("YOUTUBE_API_KEY", "")
          script_path = Path(sys.argv[1])
          placeholder = YOUTUBE_API_KEY

          if not api_key:
              raise SystemExit(
                  "::error::Missing YOUTUBE_API_KEY. "
                  "Add it in Settings → Secrets and variables → Actions."
              )

          if not script_path.is_file():
              raise SystemExit(
                  "::error::script.js was not found in the deployment artifact."
              )

          content = script_path.read_text(encoding="utf-8")
          placeholder_count = content.count(placeholder)

          if placeholder_count == 0:
              raise SystemExit(
                  "::error::YOUR_YOUTUBE_API_KEY placeholder was not found in script.js."
              )

          # Replace every placeholder in the temporary deployment copy.
          updated_content = content.replace(placeholder, api_key)

          if placeholder in updated_content:
              raise SystemExit(
                  "::error::API key placeholder still exists after replacement."
              )

          script_path.write_text(updated_content, encoding="utf-8")

          print(
              f"::notice::YouTube API key injected into {placeholder_count} location(s) "
              "in the deployment artifact."
          )
          PY

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ${{ runner.temp }}/youtube-music-player

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5