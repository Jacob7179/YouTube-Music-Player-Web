name: Deploy YouTube Music Player to Pages

on:
  push:
    branches: ["main"]

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Ensures JavaScript-based GitHub Actions run with Node.js 24.
# This avoids Node 20 deprecation warnings and compatibility issues.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build Pages artifact and inject API key
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          set -euo pipefail

          SITE_DIR="$RUNNER_TEMP/youtube-music-player"
          rm -rf "$SITE_DIR"
          mkdir -p "$SITE_DIR"

          cp -L index.html 404.html style.css script.js "$SITE_DIR/"

          for folder in alpha beta resource; do
            if [ -d "$folder" ]; then
              cp -RL "$folder" "$SITE_DIR/$folder"
            fi
          done

          # Pages artifact must not contain symbolic or hard links.
          if find "$SITE_DIR" -type l -print -quit | grep -q .; then
            echo "::error::Deployment artifact contains symbolic links."
            exit 1
          fi

          if find "$SITE_DIR" -type f -links +1 -print -quit | grep -q .; then
            echo "::error::Deployment artifact contains hard links."
            exit 1
          fi

          find "$SITE_DIR" -type d -exec chmod 755 {} +
          find "$SITE_DIR" -type f -exec chmod 644 {} +

          python3 - "$SITE_DIR/script.js" <<'PY'
          from pathlib import Path
          import json
          import os
          import sys

          api_key = os.environ.get("YOUTUBE_API_KEY", "")
          script_path = Path(sys.argv[1])
          source_line = 'const YOUTUBE_API_KEY = "YOUR_YOUTUBE_API_KEY";'

          if not api_key:
              raise SystemExit(
                  "::error::Missing YOUTUBE_API_KEY. "
                  "Add it in Settings → Secrets and variables → Actions."
              )

          content = script_path.read_text(encoding="utf-8")

          if source_line not in content:
              raise SystemExit(
                  "::error::Could not find the YOUTUBE_API_KEY declaration in script.js."
              )

          script_path.write_text(
              content.replace(
                  source_line,
                  f"const YOUTUBE_API_KEY = {json.dumps(api_key)};",
                  1
              ),
              encoding="utf-8"
          )

          print("::notice::YouTube API key was injected successfully.")
          PY

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ${{ runner.temp }}/youtube-music-player

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5